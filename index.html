<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player — Studio Frame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0C0E;
    --panel:#15171A;
    --card:#1B1D21;
    --ink:#EDEBE6;
    --muted:#8B8D93;
    --gold:#C9A24B;
    --line:rgba(237,235,230,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px;
  }
  .player{
    width:100%;
    max-width:380px;
    background:var(--panel);
    border:1px solid var(--line);
    padding:30px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:24px;
  }
  .eyebrow::before{ content:""; width:18px;height:1px;background:var(--gold); }

  .art{
    width:100%;
    aspect-ratio:1/1;
    background:var(--card);
    border:1px solid var(--line);
    overflow:hidden;
    margin-bottom:24px;
    position:relative;
  }
  .art img{
    width:100%; height:100%;
    object-fit:cover;
    transition:transform 6s ease;
  }
  .player.playing .art img{ transform:scale(1.08); }
  .art::after{
    content:"";
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(11,12,14,0.7), transparent 50%);
  }

  .track-info{ text-align:center; margin-bottom:22px; }
  .track-title{
    font-family:'Playfair Display',serif;
    font-weight:600;
    font-size:1.4rem;
  }
  .track-artist{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
    margin-top:6px;
    letter-spacing:0.05em;
  }

  .progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:22px;
  }
  .time{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    width:36px;
  }
  .time.end{ text-align:right; }
  .progress-bar{
    flex:1;
    height:3px;
    background:var(--line);
    position:relative;
    cursor:pointer;
  }
  .progress-fill{
    position:absolute;
    top:0; left:0; height:100%;
    background:var(--gold);
    width:0%;
  }
  .progress-fill::after{
    content:"";
    position:absolute;
    right:-5px; top:50%;
    transform:translateY(-50%);
    width:11px; height:11px;
    border-radius:50%;
    background:var(--gold);
    opacity:0;
    transition:opacity 0.2s ease;
  }
  .progress-bar:hover .progress-fill::after{ opacity:1; }

  .controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:26px;
    margin-bottom:22px;
  }
  .controls button{
    background:none;
    border:none;
    color:var(--ink);
    cursor:pointer;
    font-size:18px;
    transition:color 0.3s ease, transform 0.2s ease;
  }
  .controls button:hover{ color:var(--gold); transform:scale(1.1); }
  .play-btn{
    width:56px; height:56px;
    border-radius:50%;
    background:var(--gold);
    color:var(--bg) !important;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
  }
  .play-btn:hover{ background:#dcb15c; color:var(--bg) !important; transform:scale(1.06); }

  .bottom-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .volume-row{
    display:flex;
    align-items:center;
    gap:8px;
    flex:1;
  }
  .volume-row span{ font-size:13px; color:var(--muted); }
  .volume-bar{
    flex:1;
    max-width:100px;
    height:3px;
    background:var(--line);
    position:relative;
    cursor:pointer;
  }
  .volume-fill{
    position:absolute; top:0; left:0; height:100%;
    background:var(--muted);
    width:70%;
  }
  .playlist-toggle{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.05em;
    cursor:pointer;
    border:1px solid var(--line);
    padding:8px 14px;
    transition:all 0.3s ease;
  }
  .playlist-toggle:hover{ color:var(--gold); border-color:var(--gold); }

  .playlist{
    margin-top:20px;
    border-top:1px solid var(--line);
    padding-top:16px;
    display:none;
  }
  .playlist.show{ display:block; }
  .playlist-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 6px;
    cursor:pointer;
    border-radius:4px;
    transition:background 0.2s ease;
  }
  .playlist-item:hover{ background:var(--card); }
  .playlist-item.active{ color:var(--gold); }
  .playlist-item .pi-name{ font-size:13px; }
  .playlist-item .pi-artist{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); }
</style>
</head>
<body>

<div class="player" id="player">
  <div class="eyebrow">Studio Frame — Now Playing</div>

  <div class="art"><img id="artImg" src="https://picsum.photos/id/1025/500/500"></div>

  <div class="track-info">
    <div class="track-title" id="trackTitle">Golden Hour</div>
    <div class="track-artist" id="trackArtist">Ambient Waves</div>
  </div>

  <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <div class="progress-row">
    <span class="time" id="curTime">0:00</span>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="time end" id="durTime">0:00</span>
  </div>

  <div class="controls">
    <button id="prevBtn">⏮</button>
    <button id="playBtn" class="play-btn">▶</button>
    <button id="nextBtn">⏭</button>
  </div>

  <div class="bottom-row">
    <div class="volume-row">
      <span>🔊</span>
      <div class="volume-bar" id="volumeBar">
        <div class="volume-fill" id="volumeFill"></div>
      </div>
    </div>
    <div class="playlist-toggle" id="playlistToggle">PLAYLIST</div>
  </div>

  <div class="playlist" id="playlist"></div>
</div>

<script>
  const tracks = [
    { title:"Golden Hour", artist:"Ambient Waves", art:"https://picsum.photos/id/1025/500/500", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
    { title:"City Lights", artist:"Night Drive", art:"https://picsum.photos/id/1021/500/500", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
    { title:"Open Road", artist:"Wanderlust", art:"https://picsum.photos/id/1043/500/500", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" },
    { title:"Still Water", artist:"Deep Focus", art:"https://picsum.photos/id/1015/500/500", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" }
  ];

  let currentTrack = 0;
  let isPlaying = false;

  const audio = document.getElementById('audio');
  const player = document.getElementById('player');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const artImg = document.getElementById('artImg');
  const trackTitle = document.getElementById('trackTitle');
  const trackArtist = document.getElementById('trackArtist');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const curTime = document.getElementById('curTime');
  const durTime = document.getElementById('durTime');
  const volumeBar = document.getElementById('volumeBar');
  const volumeFill = document.getElementById('volumeFill');
  const playlistToggle = document.getElementById('playlistToggle');
  const playlistEl = document.getElementById('playlist');

  function formatTime(sec){
    if(isNaN(sec)) return "0:00";
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60).toString().padStart(2,'0');
    return `${m}:${s}`;
  }

  function loadTrack(index, autoplay=true){
    currentTrack = index;
    const t = tracks[index];
    audio.src = t.src;
    artImg.src = t.art;
    trackTitle.textContent = t.title;
    trackArtist.textContent = t.artist;
    renderPlaylist();
    if(autoplay){ audio.play(); isPlaying = true; updatePlayBtn(); }
  }

  function updatePlayBtn(){
    playBtn.textContent = isPlaying ? "⏸" : "▶";
    player.classList.toggle('playing', isPlaying);
  }

  playBtn.addEventListener('click', () => {
    if(isPlaying){ audio.pause(); } else { audio.play(); }
    isPlaying = !isPlaying;
    updatePlayBtn();
  });

  nextBtn.addEventListener('click', () => loadTrack((currentTrack+1) % tracks.length));
  prevBtn.addEventListener('click', () => loadTrack((currentTrack-1+tracks.length) % tracks.length));

  audio.addEventListener('timeupdate', () => {
    const pct = (audio.currentTime / audio.duration) * 100 || 0;
    progressFill.style.width = pct + "%";
    curTime.textContent = formatTime(audio.currentTime);
  });

  audio.addEventListener('loadedmetadata', () => {
    durTime.textContent = formatTime(audio.duration);
  });

  audio.addEventListener('ended', () => loadTrack((currentTrack+1) % tracks.length));

  progressBar.addEventListener('click', (e) => {
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  audio.volume = 0.7;
  volumeBar.addEventListener('click', (e) => {
    const rect = volumeBar.getBoundingClientRect();
    const pct = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
    audio.volume = pct;
    volumeFill.style.width = (pct*100) + "%";
  });

  playlistToggle.addEventListener('click', () => {
    playlistEl.classList.toggle('show');
  });

  function renderPlaylist(){
    playlistEl.innerHTML = '';
    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'playlist-item' + (i === currentTrack ? ' active' : '');
      item.innerHTML = `<div><div class="pi-name">${t.title}</div><div class="pi-artist">${t.artist}</div></div><span>${i === currentTrack && isPlaying ? '♪' : ''}</span>`;
      item.addEventListener('click', () => loadTrack(i));
      playlistEl.appendChild(item);
    });
  }

  loadTrack(0, false);
</script>

</body>
</html>
